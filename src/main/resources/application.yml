spring:
  datasource:
    url: jdbc:sqlite:./resource.db
    driver-class-name: org.sqlite.JDBC
  sql:
    init:
      mode: always
  web:
    resources:
      # 优先从磁盘读静态资源（与 pnpm build 输出一致），替换文件后无需重启 JVM；未部署源码树时 classpath 仍可用
      static-locations:
        - "file:${STATIC_ROOT:${user.dir}/src/main/resources/static/}"
        - "classpath:/static/"
      # 关闭缓存头，避免浏览器长期缓存旧 index.html / chunk
      cache:
        period: 0
      chain:
        cache: false

server:
  port: 8080

# 后台登录（生产务必通过环境变量覆盖密码）
# 自 127.0.0.1 / ::1 等环回地址访问时，表单登录不校验密码（用户名须为 app.admin.username）
# 另：--spring.profiles.active=dev 时任意来源均可任意密码（见 application-dev.yml）
app:
  admin:
    username: admin
    password: ${APP_ADMIN_PASSWORD:admin321}
    relax-auth: false
