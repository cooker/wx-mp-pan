<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>管理后台</title>
  <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css" />
  <link rel="stylesheet" href="/admin/css/admin.css">
</head>
<body>
<div id="app" class="admin-shell">
  <el-container direction="vertical" style="height:100vh;height:100dvh;min-height:0">
    <el-header class="admin-header">
      <div class="admin-brand">
        <div class="admin-mark" aria-hidden="true">管</div>
        <div class="admin-brand-text">
          <div class="admin-title">资源检索</div>
          <div class="admin-subtitle">管理后台</div>
        </div>
      </div>
      <div class="admin-actions">
        <el-link href="/" type="primary" :underline="false">返回首页</el-link>
        <form action="/admin/logout" method="post" style="display:inline">
          <el-button size="small" native-type="submit">退出登录</el-button>
        </form>
      </div>
    </el-header>
    <el-container class="admin-layout">
      <admin-sidebar-menu
        :active-menu="activeMenu"
        @select="onMenuSelect"
      ></admin-sidebar-menu>
      <el-main class="admin-main">
        <admin-site-config-page v-show="activeMenu === 'siteConfig'"></admin-site-config-page>
        <admin-analytics-page v-show="activeMenu === 'analytics'"></admin-analytics-page>
        <admin-categories-page v-show="activeMenu === 'categories'"></admin-categories-page>
        <admin-pending-page v-show="activeMenu === 'pending'"></admin-pending-page>
        <admin-published-page v-show="activeMenu === 'published'"></admin-published-page>
        <admin-blocked-review-page v-show="activeMenu === 'blocked'"></admin-blocked-review-page>
        <admin-blocked-manage-page v-show="activeMenu === 'blockedManage'"></admin-blocked-manage-page>
      </el-main>
    </el-container>
  </el-container>
</div>
<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
<script src="https://unpkg.com/axios/dist/axios.min.js"></script>
<script src="https://unpkg.com/element-plus/dist/index.full.min.js"></script>
<script src="/admin/js/components/shared/page-header.js"></script>
<script src="/admin/js/components/layout/sidebar-menu.js"></script>
<script src="/admin/js/components/pages/site-config-page.js"></script>
<script src="/admin/js/components/pages/analytics-page.js"></script>
<script src="/admin/js/components/pages/categories-page.js"></script>
<script src="/admin/js/components/pages/pending-page.js"></script>
<script src="/admin/js/components/pages/published-page.js"></script>
<script src="/admin/js/components/pages/blocked-review-page.js"></script>
<script src="/admin/js/components/pages/blocked-manage-page.js"></script>
<script src="/admin/js/admin-app.js"></script>
</body>
</html>
